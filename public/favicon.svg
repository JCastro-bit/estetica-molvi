<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="20" fill="#FDF6EE"/>
  <!-- Leaf/nature - salón orgánico/natural -->
  <g transform="translate(64,64)">
    <!-- Main leaf -->
    <path d="M0,-38 C24,-30 36,-8 36,16 C36,32 24,40 8,40 C-4,40 -12,36 -16,28 C-16,28 -12,12 0,0 C12,-12 8,-24 0,-38 Z" fill="#6B7C5E"/>
    <!-- Leaf vein -->
    <path d="M0,-30 C4,-20 8,-8 8,8 C8,20 4,32 0,36" fill="none" stroke="#4F5D45" stroke-width="2" stroke-linecap="round"/>
    <!-- Second smaller leaf -->
    <path d="M-4,8 C-20,-4 -32,-20 -28,-34 C-26,-40 -18,-40 -12,-36 C-4,-30 0,-16 -4,8 Z" fill="#8A9E7A" opacity="0.8"/>
    <!-- Stem -->
    <path d="M0,36 C-4,40 -8,44 -8,44" fill="none" stroke="#C4704B" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
